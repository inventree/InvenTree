name: Fork Deploy GCE

on:
  workflow_run:
    workflows:
      - Fork Publish GHCR
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_ref:
        description: "要部署的镜像（完整引用）"
        required: true
        default: "ghcr.io/amm10090/inventree:fix-backend-compilemessages-update"
        type: string
      project_id:
        description: "GCP 项目 ID（可选）"
        required: false
        type: string
      zone:
        description: "GCE 区域（可选）"
        required: false
        type: string
      instance:
        description: "GCE 实例名（可选）"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: fork-deploy-gce
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Image To GCE
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          persist-credentials: false

      - name: Resolve deploy variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          DEFAULT_PROJECT="gen-lang-client-0984777924"
          DEFAULT_ZONE="us-west1-a"
          DEFAULT_INSTANCE="instance-20260310-032343"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            IMAGE_REF="${{ inputs.image_ref }}"
            PROJECT_ID="${{ inputs.project_id }}"
            ZONE="${{ inputs.zone }}"
            INSTANCE="${{ inputs.instance }}"
          else
            SHORT_SHA="$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)"
            OWNER_LOWER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
            IMAGE_REF="ghcr.io/${OWNER_LOWER}/inventree:sha-${SHORT_SHA}"
            PROJECT_ID=""
            ZONE=""
            INSTANCE=""
          fi

          if [[ -z "${PROJECT_ID}" ]]; then PROJECT_ID="${{ vars.GCP_PROJECT_ID }}"; fi
          if [[ -z "${ZONE}" ]]; then ZONE="${{ vars.GCP_ZONE }}"; fi
          if [[ -z "${INSTANCE}" ]]; then INSTANCE="${{ vars.GCP_INSTANCE }}"; fi

          if [[ -z "${PROJECT_ID}" ]]; then PROJECT_ID="${DEFAULT_PROJECT}"; fi
          if [[ -z "${ZONE}" ]]; then ZONE="${DEFAULT_ZONE}"; fi
          if [[ -z "${INSTANCE}" ]]; then INSTANCE="${DEFAULT_INSTANCE}"; fi

          echo "image_ref=${IMAGE_REF}" >> "${GITHUB_OUTPUT}"
          echo "project_id=${PROJECT_ID}" >> "${GITHUB_OUTPUT}"
          echo "zone=${ZONE}" >> "${GITHUB_OUTPUT}"
          echo "instance=${INSTANCE}" >> "${GITHUB_OUTPUT}"

          echo "Deploy IMAGE_REF=${IMAGE_REF}"
          echo "Target ${PROJECT_ID}/${ZONE}/${INSTANCE}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy over IAP SSH
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_ID="${{ steps.vars.outputs.project_id }}"
          ZONE="${{ steps.vars.outputs.zone }}"
          INSTANCE="${{ steps.vars.outputs.instance }}"
          IMAGE_REF="${{ steps.vars.outputs.image_ref }}"

          gcloud --quiet config set project "${PROJECT_ID}"

          gcloud compute scp \
            --project "${PROJECT_ID}" \
            --zone "${ZONE}" \
            --tunnel-through-iap \
            .github/scripts/deploy_inventree_remote.sh \
            "${INSTANCE}:/tmp/deploy_inventree_remote.sh"

          REMOTE_CMD="$(printf "chmod +x /tmp/deploy_inventree_remote.sh && IMAGE_REF=%q COMPOSE_DIR=%q HEALTH_URL=%q /tmp/deploy_inventree_remote.sh" \
            "${IMAGE_REF}" "/mnt/docker-data/inventree" "http://127.0.0.1:8086/web")"

          gcloud compute ssh \
            "${INSTANCE}" \
            --project "${PROJECT_ID}" \
            --zone "${ZONE}" \
            --tunnel-through-iap \
            --command "${REMOTE_CMD}"

      - name: Verify public endpoint
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSI "https://epdm.amoze.net/web" | sed -n '1,20p'
